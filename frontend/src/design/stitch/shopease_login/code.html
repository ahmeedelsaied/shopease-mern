<body class="bg-background text-on-background min-h-screen flex items-center justify-center p-margin-mobile md:p-margin-desktop font-body-md antialiased selection:bg-primary-fixed selection:text-on-primary-fixed">
<main class="w-full max-w-md mx-auto">
<div class="bg-surface-container-lowest rounded-xl invisible-shadow p-stack-lg border border-surface-variant backdrop-blur-2xl">
<!-- Brand / Header -->
<div class="text-center mb-stack-lg">
<h1 class="text-headline-lg font-headline-lg text-primary tracking-tighter mb-stack-sm">ShopEase</h1>
<p class="text-body-md font-body-md text-on-surface-variant">Sign in to continue</p>
</div>
<!-- Form -->
<form action="#" class="space-y-stack-md flex flex-col" method="POST">
<!-- Email Input -->
<div class="relative group">
<input class="peer w-full bg-transparent border-0 border-b border-surface-variant focus:border-secondary focus:ring-0 px-0 py-unit text-body-lg font-body-lg text-on-surface placeholder-transparent transition-colors duration-200" id="email" name="email" placeholder="Email Address" required="" type="email"/>
<label class="absolute left-0 -top-4 text-label-sm font-label-sm text-on-surface-variant transition-all peer-placeholder-shown:text-body-lg peer-placeholder-shown:top-2 peer-focus:-top-4 peer-focus:text-label-sm peer-focus:text-secondary cursor-text" for="email">
                        Email Address
                    </label>
</div>
<!-- Password Input -->
<div class="relative group mt-stack-md">
<input class="peer w-full bg-transparent border-0 border-b border-surface-variant focus:border-secondary focus:ring-0 px-0 py-unit text-body-lg font-body-lg text-on-surface placeholder-transparent transition-colors duration-200" id="password" name="password" placeholder="Password" required="" type="password"/>
<label class="absolute left-0 -top-4 text-label-sm font-label-sm text-on-surface-variant transition-all peer-placeholder-shown:text-body-lg peer-placeholder-shown:top-2 peer-focus:-top-4 peer-focus:text-label-sm peer-focus:text-secondary cursor-text" for="password">
                        Password
                    </label>
</div>
<!-- Forgot Password -->
<div class="flex justify-end mt-unit">
<a class="text-label-sm font-label-sm text-on-surface-variant hover:text-primary transition-colors duration-200" href="#">
                        Forgot Password?
                    </a>
</div>
<!-- Actions -->
<div class="flex flex-col gap-stack-sm mt-stack-lg">
<button class="w-full bg-primary text-on-primary py-3 px-6 rounded-DEFAULT text-label-md font-label-md hover:opacity-90 active:scale-[0.98] transition-all duration-200 flex justify-center items-center" type="submit">
                        Sign In
                    </button>
<a class="w-full bg-transparent text-primary py-3 px-6 rounded-DEFAULT text-label-md font-label-md border border-surface-variant hover:bg-surface-container-low active:scale-[0.98] transition-all duration-200 flex justify-center items-center text-center" href="#">
                        Create Account
                    </a>
</div>
</form>
</div>
